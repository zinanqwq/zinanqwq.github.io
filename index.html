<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <title>CATPIXEL - 520MC.TOP</title>
    <style>
        body {
            background: linear-gradient(50deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0000FF, #4B0082, #8B00FF);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	    -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            color: black;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}
        }

        h1 {
            margin-bottom: 45px;
        }

        p {
            margin-bottom: 30px;
        }

        button {
            background-color: #1E90FF;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #1D79D4;
        }

        a {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 1(开启重定向)  2(关闭重定向) -->
        <span id="redirect-switch" style="display: none;">2</span>
        <h1>CATPIXEL - 520MC.TOP</h1>
        <p id="message"></p>
        <button id="button" style="display: none;">▸ 加入QQ群获取更多信息 ◂</button>
        <a id="manual-redirect" style="display: none;" href="https://www.catpixel.cn/">如果无法跳转，请点击这里</a>
    </div>
    <script>
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        });
	    
        const redirectSwitch = document.getElementById('redirect-switch');
        const message = document.getElementById('message');
        const button = document.getElementById('button');
        const manualRedirect = document.getElementById('manual-redirect');

        const targetUrl = 'https://www.catpixel.cn/';

        if (redirectSwitch.textContent === '1') {
            message.textContent = '正在为您跳转到CATPIXEL官网...';
            manualRedirect.style.display = 'block';

            setTimeout(() => {
                window.location.href = targetUrl;
            }, 0);
        } else {
            message.textContent = '抱歉，网站正在维护中，请稍后再来。';
            button.style.display = 'block';
            button.addEventListener('click', () => {
                window.open('https://qm.qq.com/cgi-bin/qm/qr?k=OoC4bwwT3OXt35_JnQhfsk1-rO87EAML&jump_from=webapi&authKey=On5V6WNOz/9aiNa+4yOpOgQngXVqu1jl3fzWy1HFXZNPLG8y6mJh7q046aqUTl2k', '_blank');
            });
        }
    </script>
</body>

</html>
